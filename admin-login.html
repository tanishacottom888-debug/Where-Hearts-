<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Admin Login | Where Hearts Meet</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0F1A24;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .login-card {
            background: #F9F6F0;
            border-radius: 40px;
            padding: 40px 32px;
            max-width: 400px;
            width: 100%;
            text-align: center;
        }
        .login-card h1 {
            color: #0F1A24;
            margin-bottom: 8px;
        }
        .login-card p {
            color: #6B5E5E;
            margin-bottom: 32px;
        }
        input {
            width: 100%;
            padding: 14px 16px;
            margin-bottom: 16px;
            border: 1.5px solid #E8E0D5;
            border-radius: 60px;
            font-size: 16px;
        }
        button {
            width: 100%;
            background: #6B2D3E;
            color: white;
            border: none;
            padding: 14px;
            border-radius: 60px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
        }
        .error {
            color: #6B2D3E;
            margin-top: 16px;
            font-size: 14px;
        }
    </style>
</head>
<body>
<div class="login-card">
    <h1>🛡️ Admin Login</h1>
    <p>Where Hearts Meet Agency</p>
    <input type="email" id="email" placeholder="admin@whereheartsmeet.com">
    <input type="password" id="password" placeholder="Password">
    <button onclick="login()">Login →</button>
    <div id="errorMsg" class="error"></div>
</div>

<script>
    async function login() {
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        
        try {
            await adminLogin(email, password);
            window.location.href = 'admin.html';
        } catch (error) {
            document.getElementById('errorMsg').innerText = 'Invalid email or password';
        }
    }
</script>
</body>
</html>
