<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Meet Singles | Where Hearts Meet</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0F1A24;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            padding: 20px 16px 50px;
        }

        .container {
            max-width: 550px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            margin-bottom: 32px;
            padding: 20px 0;
        }

        .header h1 {
            font-size: 32px;
            color: #F9F6F0;
        }

        .header p {
            color: #C6A43F;
            margin-top: 8px;
            font-size: 14px;
        }

        .filter-bar {
            background: #1A2E3A;
            border-radius: 60px;
            padding: 8px 16px;
            margin-bottom: 24px;
            display: flex;
            gap: 12px;
        }

        .filter-bar select {
            flex: 1;
            background: #0F1A24;
            color: #F9F6F0;
            border: 1px solid #C6A43F;
            padding: 10px;
            border-radius: 40px;
        }

        .members-grid {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .member-card {
            background: #F9F6F0;
            border-radius: 28px;
            overflow: hidden;
            padding: 20px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
        }

        .member-photo {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid #C6A43F;
            margin-bottom: 16px;
        }

        .member-name {
            font-size: 22px;
            font-weight: 700;
            color: #0F1A24;
        }

        .member-details {
            color: #6B5E5E;
            font-size: 14px;
            margin: 8px 0;
        }

        .member-bio {
            font-style: italic;
            margin: 12px 0;
            padding: 10px;
            background: #FFF0E8;
            border-radius: 20px;
            color: #4A3B32;
        }

        .whatsapp-btn {
            background: #25D366;
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 50px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            margin-top: 12px;
        }

        .no-members {
            text-align: center;
            color: #F9F6F0;
            padding: 40px;
            background: rgba(107, 45, 62, 0.6);
            border-radius: 28px;
        }

        @media (max-width: 480px) {
            .member-photo {
                width: 80px;
                height: 80px;
            }
            .member-name {
                font-size: 18px;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>💕 Meet Your Match</h1>
        <p>Browse singles looking for love</p>
    </div>

    <div class="filter-bar">
        <select id="genderFilter">
            <option value="all">All</option>
            <option value="Female">Women</option>
            <option value="Male">Men</option>
        </select>
    </div>

    <div id="membersContainer" class="members-grid">
        <div class="no-members">Loading members...</div>
    </div>
</div>

<script>
    let members = [];

    function loadMembers() {
        const stored = localStorage.getItem('whm_members');
        if (stored) {
            members = JSON.parse(stored);
        } else {
            // Default demo members
            members = [
                {
                    id: 1,
                    name: "James Mwangi",
                    age: 34,
                    country: "Kenya",
                    gender: "Male",
                    interestedIn: "Women",
                    bio: "Architect who loves hiking and deep conversations",
                    photo: "https://randomuser.me/api/portraits/men/32.jpg",
                    whatsapp: "+254712345678"
                },
                {
                    id: 2,
                    name: "Aisha Wanjiku",
                    age: 29,
                    country: "Uganda",
                    gender: "Female",
                    interestedIn: "Men",
                    bio: "Doctor, loves traveling and good food",
                    photo: "https://randomuser.me/api/portraits/women/68.jpg",
                    whatsapp: "+256712345678"
                }
            ];
            saveMembers();
        }
        renderMembers();
    }

    function saveMembers() {
        localStorage.setItem('whm_members', JSON.stringify(members));
    }

    function renderMembers() {
        const filter = document.getElementById('genderFilter').value;
        let filtered = members;
        if (filter !== 'all') {
            filtered = members.filter(m => m.gender === filter);
        }

        const container = document.getElementById('membersContainer');
        if (filtered.length === 0) {
            container.innerHTML = '<div class="no-members">💔 No members found. Check back soon!</div>';
            return;
        }

        let html = '';
        filtered.forEach(member => {
            html += `
                <div class="member-card">
                    <img class="member-photo" src="${member.photo}" onerror="this.src='https://via.placeholder.com/100'">
                    <div class="member-name">${member.name}, ${member.age}</div>
                    <div class="member-details">📍 ${member.country} · ${member.gender}</div>
                    <div class="member-bio">“${member.bio}”</div>
                    <button class="whatsapp-btn" onclick="connectWhatsApp('${member.whatsapp}', '${member.name.replace(/'/g, "\\'")}')">
                        💬 Connect on WhatsApp
                    </button>
                </div>
            `;
        });
        container.innerHTML = html;
    }

    function connectWhatsApp(number, name) {
        const msg = `Hello! I saw your profile on Where Hearts Meet Agency. I would love to connect.`;
        const url = `https://wa.me/${number}?text=${encodeURIComponent(msg)}`;
        window.open(url, '_blank');
    }

    document.getElementById('genderFilter').addEventListener('change', renderMembers);
    loadMembers();
</script>
</body>
</html>
