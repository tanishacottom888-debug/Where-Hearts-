<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Meet Singles | Where Hearts Meet</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0F1A24; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; padding: 20px 16px 50px; }
        .container { max-width: 800px; margin: 0 auto; }
        .header { text-align: center; margin-bottom: 32px; }
        .header h1 { color: #F9F6F0; font-size: 32px; }
        .header p { color: #C6A43F; margin-top: 8px; }
        .filter-bar { background: #1A2E3A; border-radius: 60px; padding: 8px 16px; margin-bottom: 24px; display: flex; justify-content: center; }
        .filter-bar select { background: #0F1A24; color: #F9F6F0; border: 1px solid #C6A43F; padding: 10px 20px; border-radius: 40px; width: 200px; }
        .members-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; }
        .member-card { background: #F9F6F0; border-radius: 24px; padding: 20px 16px; text-align: center; cursor: pointer; transition: transform 0.2s; }
        .member-card:active { transform: scale(0.98); }
        .member-photo { width: 100px; height: 100px; border-radius: 50%; object-fit: cover; border: 3px solid #C6A43F; margin: 0 auto 12px; display: block; }
        .member-name { font-size: 20px; font-weight: 800; color: #0F1A24; }
        .member-age { color: #6B2D3E; font-weight: 600; margin: 2px 0; }
        .member-location { font-size: 13px; color: #6B5E5E; margin: 4px 0; }
        .see-more-btn { background: transparent; border: 1.5px solid #6B2D3E; color: #6B2D3E; padding: 8px 12px; border-radius: 40px; font-size: 13px; font-weight: 600; cursor: pointer; width: 100%; margin-top: 8px; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 1000; justify-content: center; align-items: center; padding: 20px; }
        .modal-content { background: #F9F6F0; border-radius: 40px; max-width: 500px; width: 100%; max-height: 90vh; overflow-y: auto; position: relative; padding: 24px; }
        .close-modal { position: absolute; top: 16px; right: 20px; font-size: 28px; cursor: pointer; color: #6B5E5E; }
        .modal-photo { width: 120px; height: 120px; border-radius: 50%; object-fit: cover; border: 4px solid #C6A43F; margin: 0 auto 16px; display: block; }
        .modal-photos { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin: 16px 0; }
        .modal-photos img { width: 80px; height: 80px; border-radius: 16px; object-fit: cover; border: 2px solid #C6A43F; }
        .modal-name { font-size: 26px; font-weight: 800; color: #0F1A24; text-align: center; }
        .section-title { font-weight: 700; color: #0F1A24; margin: 16px 0 8px; border-left: 3px solid #C6A43F; padding-left: 12px; }
        .modal-bio { background: #FFF0E8; padding: 12px; border-radius: 20px; line-height: 1.5; color: #4A3B32; }
        .whatsapp-btn { width: 100%; background: #25D366; color: white; border: none; padding: 14px; border-radius: 60px; font-size: 16px; font-weight: 600; margin-top: 24px; cursor: pointer; }
        .no-members { grid-column: span 2; text-align: center; color: #F9F6F0; padding: 40px; background: rgba(107,45,62,0.6); border-radius: 28px; }
        .loading { text-align: center; color: #F9F6F0; padding: 40px; }
        @media (max-width: 550px) { .members-grid { grid-template-columns: 1fr; } .no-members { grid-column: span 1; } }
    </style>
</head>
<body>
<div class="container">
    <div class="header"><h1>💕 Meet Your Match</h1><p>Tap any profile to see full details</p></div>
    <div class="filter-bar"><select id="genderFilter"><option value="all">All</option><option value="Female">Women</option><option value="Male">Men</option></select></div>
    <div id="membersContainer" class="members-grid"><div class="loading">Loading members...</div></div>
</div>

<div id="memberModal" class="modal">
    <div class="modal-content"><span class="close-modal" onclick="closeModal()">&times;</span>
    <img id="modalPhoto" class="modal-photo" src=""><div id="modalPhotos" class="modal-photos"></div>
    <div id="modalName" class="modal-name"></div><div class="section-title">📖 About</div><div id="modalBio" class="modal-bio"></div>
    <div class="section-title">💫 Looking for</div><div id="modalLookingFor" class="modal-bio"></div>
    <button id="whatsappBtn" class="whatsapp-btn">💬 Connect via WhatsApp (Admin Assisted)</button></div>
</div>

<script>
    // ============ SUPABASE CONFIGURATION ============
    const SUPABASE_URL = "https://cggskooljrjacgjnxotc.supabase.co";
    const SUPABASE_ANON_KEY = "sb_publishable_Ge37Z1zdP79Vb19GobMCCg_9PVkXSlT";
    
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    
    const ADMIN_WHATSAPP = "+256712345678";
    let members = [];
    let currentMember = null;

    // ============ GET MEMBERS FROM SUPABASE ============
    async function getMembers() {
        const { data, error } = await supabaseClient
            .from('members')
            .select('*')
            .order('created_at', { ascending: false });
        
        if (error) {
            console.error("Error loading members:", error);
            return [];
        }
        return data || [];
    }

    // ============ LOAD AND DISPLAY MEMBERS ============
    async function loadMembers() {
        const container = document.getElementById('membersContainer');
        container.innerHTML = '<div class="loading">Loading members...</div>';
        
        members = await getMembers();
        const filter = document.getElementById('genderFilter').value;
        let filtered = filter === 'all' ? members : members.filter(m => m.gender === filter);
        
        if (filtered.length === 0) { 
            container.innerHTML = '<div class="no-members">💔 No members yet. Check back soon!</div>'; 
            return; 
        }
        
        let html = '';
        filtered.forEach(m => {
            const mainPhoto = m.photos && m.photos.length ? m.photos[0] : 'https://via.placeholder.com/100';
            html += `<div class="member-card" onclick="showDetails(${m.id})">
                <img class="member-photo" src="${mainPhoto}" onerror="this.src='https://via.placeholder.com/100'">
                <div class="member-name">${m.name}, ${m.age}</div>
                <div class="member-location">📍 ${m.city || m.country}, ${m.country}</div>
                <button class="see-more-btn">See more...</button>
            </div>`;
        });
        container.innerHTML = html;
    }

    // ============ SHOW MEMBER DETAILS IN MODAL ============
    function showDetails(id) {
        currentMember = members.find(m => m.id === id);
        if (!currentMember) return;
        
        document.getElementById('modalPhoto').src = currentMember.photos?.[0] || 'https://via.placeholder.com/120';
        
        let photosHtml = '';
        if (currentMember.photos && currentMember.photos.length) {
            currentMember.photos.forEach(p => {
                photosHtml += `<img src="${p}" onerror="this.src='https://via.placeholder.com/80'">`;
            });
        }
        document.getElementById('modalPhotos').innerHTML = photosHtml;
        document.getElementById('modalName').innerHTML = `${currentMember.name}, ${currentMember.age}`;
        document.getElementById('modalBio').innerHTML = currentMember.bio || "No bio yet.";
        document.getElementById('modalLookingFor').innerHTML = currentMember.looking_for || "Looking for a genuine connection.";
        document.getElementById('memberModal').style.display = 'flex';
    }

    // ============ CLOSE MODAL ============
    function closeModal() { 
        document.getElementById('memberModal').style.display = 'none'; 
    }

    // ============ WHATSAPP CONNECTION (ADMIN ASSISTED) ============
    document.getElementById('whatsappBtn').addEventListener('click', () => {
        if (!currentMember) return;
        const seeker = JSON.parse(localStorage.getItem('heartSeeker') || '{}');
        const seekerName = seeker.fullName || 'a member';
        const msg = `Hello! I'm ${seekerName} from Where Hearts Meet Agency. I would love to be introduced to ${currentMember.name}. Please assist me with the connection.`;
        window.open(`https://wa.me/${ADMIN_WHATSAPP}?text=${encodeURIComponent(msg)}`, '_blank');
    });

    // ============ FILTER CHANGE ============
    document.getElementById('genderFilter').addEventListener('change', loadMembers);

    // ============ CLICK OUTSIDE MODAL ============
    window.onclick = e => { 
        if (e.target === document.getElementById('memberModal')) closeModal(); 
    };

    // ============ INITIAL LOAD ============
    loadMembers();
</script>
</body>
</html>
