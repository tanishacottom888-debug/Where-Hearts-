<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Meet Singles | Where Hearts Meet</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0F1A24;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            padding: 20px 16px 50px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            margin-bottom: 32px;
            padding: 20px 0;
        }

        .header h1 {
            font-size: 32px;
            color: #F9F6F0;
        }

        .header p {
            color: #C6A43F;
            margin-top: 8px;
            font-size: 14px;
        }

        .filter-bar {
            background: #1A2E3A;
            border-radius: 60px;
            padding: 8px 16px;
            margin-bottom: 24px;
            display: flex;
            justify-content: center;
        }

        .filter-bar select {
            background: #0F1A24;
            color: #F9F6F0;
            border: 1px solid #C6A43F;
            padding: 10px 20px;
            border-radius: 40px;
            width: 200px;
        }

        .members-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px;
        }

        .member-card {
            background: #F9F6F0;
            border-radius: 24px;
            padding: 20px 16px 16px;
            text-align: center;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .member-card:active {
            transform: scale(0.98);
        }

        .member-photo {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid #C6A43F;
            margin: 0 auto 12px;
            display: block;
        }

        .member-name {
            font-size: 20px;
            font-weight: 800;
            color: #0F1A24;
        }

        .member-age {
            color: #6B2D3E;
            font-weight: 600;
            font-size: 14px;
            margin: 2px 0;
        }

        .member-location {
            font-size: 13px;
            color: #6B5E5E;
            margin: 4px 0;
        }

        .member-nationality {
            font-size: 13px;
            color: #C6A43F;
            font-weight: 500;
            margin-bottom: 12px;
        }

        .see-more-btn {
            background: transparent;
            border: 1.5px solid #6B2D3E;
            color: #6B2D3E;
            padding: 8px 12px;
            border-radius: 40px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            margin-top: 8px;
            transition: all 0.2s;
        }

        .see-more-btn:active {
            background: #6B2D3E;
            color: white;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .modal-content {
            background: #F9F6F0;
            border-radius: 40px;
            max-width: 500px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            position: relative;
            padding: 24px;
        }

        .close-modal {
            position: absolute;
            top: 16px;
            right: 20px;
            font-size: 28px;
            cursor: pointer;
            color: #6B5E5E;
            font-weight: bold;
        }

        .modal-photo {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid #C6A43F;
            margin: 0 auto 16px;
            display: block;
        }

        .modal-photos {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: center;
            margin: 16px 0;
        }

        .modal-photos img {
            width: 80px;
            height: 80px;
            border-radius: 16px;
            object-fit: cover;
            border: 2px solid #C6A43F;
        }

        .modal-name {
            font-size: 26px;
            font-weight: 800;
            color: #0F1A24;
            text-align: center;
        }

        .modal-age {
            text-align: center;
            color: #6B2D3E;
            font-weight: 600;
            margin: 4px 0;
        }

        .modal-location {
            text-align: center;
            color: #6B5E5E;
        }

        .modal-nationality {
            text-align: center;
            color: #C6A43F;
            font-weight: 500;
            margin-bottom: 20px;
        }

        .section-title {
            font-weight: 700;
            color: #0F1A24;
            margin: 16px 0 8px;
            border-left: 3px solid #C6A43F;
            padding-left: 12px;
        }

        .modal-bio {
            background: #FFF0E8;
            padding: 12px;
            border-radius: 20px;
            line-height: 1.5;
            color: #4A3B32;
        }

        .whatsapp-assist-btn {
            width: 100%;
            background: #25D366;
            color: white;
            border: none;
            padding: 14px;
            border-radius: 60px;
            font-size: 16px;
            font-weight: 600;
            margin-top: 24px;
            cursor: pointer;
        }

        .admin-note {
            text-align: center;
            font-size: 11px;
            color: #8A7A7A;
            margin-top: 12px;
        }

        .no-members {
            grid-column: span 2;
            text-align: center;
            color: #F9F6F0;
            padding: 40px;
            background: rgba(107, 45, 62, 0.6);
            border-radius: 28px;
        }

        @media (max-width: 550px) {
            .members-grid {
                grid-template-columns: 1fr;
            }
            .no-members {
                grid-column: span 1;
            }
            .member-photo {
                width: 85px;
                height: 85px;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>💕 Meet Your Match</h1>
        <p>Tap "See more" to view full profile</p>
    </div>

    <div class="filter-bar">
        <select id="genderFilter">
            <option value="all">All Members</option>
            <option value="Female">Women</option>
            <option value="Male">Men</option>
        </select>
    </div>

    <div id="membersContainer" class="members-grid">
        <div class="no-members">Loading members...</div>
    </div>
</div>

<div id="memberModal" class="modal">
    <div class="modal-content">
        <span class="close-modal" onclick="closeModal()">&times;</span>
        <img id="modalPhoto" class="modal-photo" src="" alt="Member photo">
        <div id="modalPhotos" class="modal-photos"></div>
        <div id="modalName" class="modal-name"></div>
        <div id="modalAge" class="modal-age"></div>
        <div id="modalLocation" class="modal-location"></div>
        <div id="modalNationality" class="modal-nationality"></div>
        
        <div class="section-title">📖 About</div>
        <div id="modalBio" class="modal-bio"></div>
        
        <div class="section-title">💫 Looking for</div>
        <div id="modalLookingFor" class="modal-bio"></div>
        
        <button id="whatsappAssistBtn" class="whatsapp-assist-btn">💬 Connect via WhatsApp (Admin Assisted)</button>
        <div class="admin-note">🔒 You'll be connected to our agency admin who will facilitate the introduction.</div>
    </div>
</div>

<script>
    // IMPORTANT: Replace with YOUR admin WhatsApp number
    const ADMIN_WHATSAPP = "+256712345678";
    
    let members = [];
    let currentMember = null;

    function loadMembers() {
        const stored = localStorage.getItem('whm_members');
        console.log("Loaded from localStorage:", stored);
        
        if (stored && stored !== "[]") {
            members = JSON.parse(stored);
        } else {
            // Demo data if empty
            members = [];
        }
        
        console.log("Members array:", members);
        renderMembers();
    }

    function renderMembers() {
        const filter = document.getElementById('genderFilter').value;
        let filtered = members;
        if (filter !== 'all') {
            filtered = members.filter(m => m.gender === filter);
        }

        const container = document.getElementById('membersContainer');
        if (filtered.length === 0) {
            container.innerHTML = '<div class="no-members">💔 No members yet. Admin needs to add members in the admin panel.</div>';
            return;
        }

        let html = '';
        filtered.forEach(member => {
            const mainPhoto = member.photos && member.photos.length > 0 ? member.photos[0] : 'https://via.placeholder.com/100';
            html += `
                <div class="member-card" onclick="showMemberDetails(${member.id})">
                    <img class="member-photo" src="${mainPhoto}" onerror="this.src='https://via.placeholder.com/100'">
                    <div class="member-name">${member.name}, ${member.age}</div>
                    <div class="member-location">📍 ${member.city || member.country}, ${member.country}</div>
                    <div class="member-nationality">${member.nationality || member.country}</div>
                    <button class="see-more-btn">See more...</button>
                </div>
            `;
        });
        container.innerHTML = html;
    }

    function showMemberDetails(id) {
        currentMember = members.find(m => m.id === id);
        if (!currentMember) return;
        
        const mainPhoto = currentMember.photos && currentMember.photos.length > 0 ? currentMember.photos[0] : 'https://via.placeholder.com/120';
        document.getElementById('modalPhoto').src = mainPhoto;
        
        // Show all photos
        let photosHtml = '';
        if (currentMember.photos && currentMember.photos.length > 0) {
            currentMember.photos.forEach(photo => {
                photosHtml += `<img src="${photo}" onerror="this.src='https://via.placeholder.com/80'">`;
            });
        }
        document.getElementById('modalPhotos').innerHTML = photosHtml;
        
        document.getElementById('modalName').innerHTML = `${currentMember.name}, ${currentMember.age}`;
        document.getElementById('modalAge').innerHTML = `${currentMember.gender}`;
        document.getElementById('modalLocation').innerHTML = `📍 ${currentMember.city || currentMember.country}, ${currentMember.country}`;
        document.getElementById('modalNationality').innerHTML = `🌍 ${currentMember.nationality || currentMember.country}`;
        document.getElementById('modalBio').innerHTML = currentMember.bio || "This member hasn't added a bio yet.";
        document.getElementById('modalLookingFor').innerHTML = currentMember.lookingFor || "Looking for a genuine connection.";
        
        document.getElementById('memberModal').style.display = 'flex';
    }

    function closeModal() {
        document.getElementById('memberModal').style.display = 'none';
        currentMember = null;
    }

    document.getElementById('whatsappAssistBtn').addEventListener('click', function() {
        if (!currentMember) return;
        
        const seeker = JSON.parse(localStorage.getItem('heartSeeker') || '{}');
        const seekerName = seeker.fullName || "a member";
        
        const message = `Hello! I'm ${seekerName} from Where Hearts Meet Agency. I would love to be introduced to ${currentMember.name}. Please assist me.`;
        const url = `https://wa.me/${ADMIN_WHATSAPP}?text=${encodeURIComponent(message)}`;
        window.open(url, '_blank');
    });

    document.getElementById('genderFilter').addEventListener('change', renderMembers);
    
    window.onclick = function(event) {
        const modal = document.getElementById('memberModal');
        if (event.target === modal) {
            closeModal();
        }
    }
    
    loadMembers();
    
    // Refresh when coming back to page
    window.addEventListener('focus', loadMembers);
</script>
</body>
</html>
